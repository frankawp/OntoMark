# ontology.yaml 格式说明
#
# ⚠️ 此文件仅为格式样例，不包含任何实体类型定义
# ⚠️ 实际项目中必须通过 `ontomark ontology-status <project-path>` 命令获取可用的实体类型
# ⚠️ 切勿假设或硬编码任何实体类型名称
#
# === 格式结构 ===
#
# version: "1.0"
# entity_types:
#   <类型名称>:
#     description: 类型描述
#     template:
#       info:
#         - key: 字段名
#           label: 字段显示名
#
# relations:
#   <关系名称>:
#     description: 关系描述
#     from: 源实体类型
#     to: 目标实体类型
#
# === 字段说明 ===
#
# entity_types.<类型名称>.description
#   - 必需，类型的文字描述
#
# entity_types.<类型名称>.template.info
#   - 可选，定义实体页面的关键信息字段
#   - 每个 info 项包含 key（字段名）和 label（显示名）
#
# relations.<关系名称>.from / .to
#   - 必需，指定关系连接的实体类型
#
